<section id="contact" class="cta">
  <div class="cta__inner">
    <div>
      <div class="eyebrow">— Бесплатный расчёт</div>
      <h2>Рассчитаем стоимость вашего дома</h2>
      <p class="cta__lead">Оставьте заявку — специалист свяжется с вами и предоставит предварительную смету.</p>
    </div>
    <div class="cta__form">
      <div data-lead-success hidden>
        <div class="cta__success">
          <div class="cta__success-ico"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
          <h3>Заявка принята</h3>
          <p>Спасибо! Наш специалист свяжется с вами в ближайшее время.</p>
        </div>
      </div>
      <form data-lead-form>
        <h3>Оставить заявку</h3>
        <div class="cta__fields">
          <div class="field"><label>Ваше имя</label><input type="text" placeholder="Иван Иванов" required /></div>
          <div class="field"><label>Телефон</label><input type="tel" placeholder="+375 (__) ___-__-__" required /></div>
          <div class="field"><label>Комментарий</label><input type="text" placeholder="Площадь, участок, пожелания…" /></div>
          <button type="submit" class="btn btn--dark send-btn" style="width:100%;padding:16px;margin-top:6px;font-size:16px;">
            Отправить заявку
            <span class="send-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></span>
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
